<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>DeepSeek для курса по сайтам | AI-помощник</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background-color: #0f0f0f;
            color: #e3e3e3;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Верхняя панель */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 20px;
            background-color: #1a1a1a;
            border-bottom: 1px solid #2c2c2c;
            flex-shrink: 0;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 600;
            font-size: 1.2rem;
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            background: #00d27a;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #0f0f0f;
        }

        .key-status {
            font-size: 0.85rem;
            background: #252525;
            padding: 6px 12px;
            border-radius: 20px;
            cursor: pointer;
            transition: 0.2s;
        }

        .key-status:hover {
            background: #333;
        }

        /* Основной чат */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            scroll-behavior: smooth;
        }

        .message {
            display: flex;
            gap: 14px;
            margin-bottom: 24px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .avatar {
            width: 36px;
            height: 36px;
            background: #2a2a2a;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            flex-shrink: 0;
        }

        .user .avatar {
            background: #00d27a;
            color: #0f0f0f;
        }

        .assistant .avatar {
            background: #3a3a3a;
            color: #00d27a;
        }

        .content {
            background: #1e1e1e;
            padding: 12px 16px;
            border-radius: 18px;
            border-top-left-radius: 6px;
            max-width: 85%;
            line-height: 1.5;
            word-break: break-word;
        }

        .user .content {
            background: #2a2f2c;
            border-top-right-radius: 6px;
        }

        .assistant .content {
            background: #252525;
        }

        .content pre {
            background: #0d0d0d;
            padding: 12px;
            border-radius: 12px;
            overflow-x: auto;
            margin: 10px 0;
            font-size: 0.9rem;
        }

        .content code {
            font-family: 'Fira Code', monospace;
            font-size: 0.9rem;
        }

        /* Поле ввода */
        .input-area {
            background-color: #1a1a1a;
            border-top: 1px solid #2c2c2c;
            padding: 16px 20px;
            flex-shrink: 0;
        }

        .input-wrapper {
            display: flex;
            gap: 12px;
            align-items: flex-end;
            background: #252525;
            border-radius: 24px;
            padding: 8px 16px;
            border: 1px solid #3a3a3a;
            transition: 0.2s;
        }

        .input-wrapper:focus-within {
            border-color: #00d27a;
        }

        textarea {
            flex: 1;
            background: transparent;
            border: none;
            color: #e3e3e3;
            font-family: inherit;
            font-size: 1rem;
            padding: 10px 0;
            resize: none;
            outline: none;
            max-height: 150px;
        }

        button {
            background: #00d27a;
            border: none;
            color: #0f0f0f;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
        }

        button:hover {
            background: #00b86a;
            transform: scale(1.02);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .new-chat-btn {
            background: #2c2c2c;
            color: #e3e3e3;
            width: auto;
            border-radius: 20px;
            padding: 0 16px;
            gap: 6px;
        }

        .status-text {
            font-size: 0.8rem;
            color: #aaa;
            margin-top: 8px;
            text-align: center;
        }

        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #1a1a1a;
        }
        ::-webkit-scrollbar-thumb {
            background: #3a3a3a;
            border-radius: 4px;
        }
    </style>
</head>
<body>

<div class="navbar">
    <div class="logo">
        <div class="logo-icon">🧠</div>
        <span>DeepSeek · Курс по сайтам</span>
    </div>
    <div style="display: flex; gap: 12px;">
        <button class="new-chat-btn" id="newChatBtn">➕ Новый диалог</button>
        <div class="key-status" id="keyStatusBtn">🔑 Ввести API-ключ</div>
    </div>
</div>

<div class="chat-container" id="chatContainer">
    <!-- сообщения будут появляться здесь -->
    <div style="text-align: center; color: #666; margin-top: 40px;">
        👋 Привет! Введи API-ключ DeepSeek (нажми на кнопку сверху) и напиши свой вопрос.<br>
        Например: «Напиши HTML-код для карточки товара» или «Как сделать адаптивное меню?»
    </div>
</div>

<div class="input-area">
    <div class="input-wrapper">
        <textarea id="messageInput" rows="1" placeholder="Спроси про создание сайтов... (Shift+Enter для переноса)" onkeydown="handleKeyDown(event)"></textarea>
        <button id="sendBtn" aria-label="Отправить">➤</button>
    </div>
    <div class="status-text" id="statusText">⚡ Готов к работе</div>
</div>

<script>
    // ------------------ Настройки ------------------
    let API_KEY = localStorage.getItem('deepseek_api_key') || '';
    let messages = [];    // массив сообщений { role, content }
    let isLoading = false;

    // Системный промпт (можно редактировать под свой курс)
    const SYSTEM_PROMPT = `Ты — эксперт-помощник для школьников, которые учатся создавать сайты с помощью HTML, CSS и JavaScript. Отвечай понятно, с примерами кода, используй дружелюбный и учебный тон. Если спрашивают про технологии — объясняй доступно.`; 

    // DOM элементы
    const chatContainer = document.getElementById('chatContainer');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    const keyStatusBtn = document.getElementById('keyStatusBtn');
    const newChatBtn = document.getElementById('newChatBtn');
    const statusSpan = document.getElementById('statusText');

    // ------------------ Инициализация ------------------
    function init() {
        loadMessagesFromStorage();
        updateKeyStatusUI();
        if (!API_KEY) {
            statusSpan.innerHTML = '⚠️ Не введён API-ключ. Нажмите "Ввести API-ключ" выше.';
            sendBtn.disabled = true;
        } else {
            sendBtn.disabled = false;
            statusSpan.innerHTML = '✅ Ключ установлен. Можно задавать вопросы.';
        }
        scrollToBottom();
    }

    function updateKeyStatusUI() {
        if (API_KEY) {
            keyStatusBtn.innerHTML = '🔑 Ключ есть ✅';
            keyStatusBtn.style.opacity = '0.8';
        } else {
            keyStatusBtn.innerHTML = '🔑 Ввести API-ключ';
            keyStatusBtn.style.opacity = '1';
        }
    }

    // Сохранение истории сообщений в localStorage
    function saveMessagesToStorage() {
        localStorage.setItem('chat_messages', JSON.stringify(messages.filter(m => m.role !== 'system')));
    }

    function loadMessagesFromStorage() {
        const saved = localStorage.getItem('chat_messages');
        if (saved) {
            messages = JSON.parse(saved);
            renderMessages();
        } else {
            // Стартовое приветствие от ассистента (не храним системное)
            messages = [
                { role: 'assistant', content: 'Привет! Я AI-помощник по созданию сайтов. Задай любой вопрос по HTML, CSS или JS — помогу с кодом и объяснениями. ✨' }
            ];
            saveMessagesToStorage();
            renderMessages();
        }
    }

    function renderMessages() {
        if (!chatContainer) return;
        chatContainer.innerHTML = '';
        if (messages.length === 0) {
            chatContainer.innerHTML = '<div style="text-align: center; color: #666; margin-top: 40px;">Начни диалог! Напиши сообщение ниже.</div>';
            return;
        }
        messages.forEach(msg => {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${msg.role}`;
            const avatar = document.createElement('div');
            avatar.className = 'avatar';
            avatar.innerText = msg.role === 'user' ? '👤' : '🤖';
            const contentDiv = document.createElement('div');
            contentDiv.className = 'content';
            // Преобразуем текст с поддержкой markdown-подобных блоков кода (упрощённо)
            let formattedContent = formatContent(msg.content);
            contentDiv.innerHTML = formattedContent;
            messageDiv.appendChild(avatar);
            messageDiv.appendChild(contentDiv);
            chatContainer.appendChild(messageDiv);
        });
        scrollToBottom();
    }

    // Простое форматирование: оборачиваем ``` ... ``` в pre/code
    function formatContent(text) {
        // Замена блоков кода
        let result = text.replace(/```(\w*)\n([\s\S]*?)```/g, (match, lang, code) => {
            return `<pre><code class="language-${lang || 'html'}">${escapeHtml(code.trim())}</code></pre>`;
        });
        // Замена инлайн-кода `...`
        result = result.replace(/`([^`]+)`/g, '<code>$1</code>');
        // Переносы строк в <br>
        result = result.replace(/\n/g, '<br>');
        return result;
    }

    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function scrollToBottom() {
        if (chatContainer) {
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }
    }

    async function sendMessageToAPI(userMessage) {
        if (!API_KEY) {
            statusSpan.innerHTML = '❌ Ошибка: нет API-ключа. Нажмите "Ввести API-ключ"';
            return null;
        }

        // Собираем сообщения: системный промпт + история + новый вопрос
        const apiMessages = [
            { role: 'system', content: SYSTEM_PROMPT },
            ...messages.map(m => ({ role: m.role, content: m.content })),
            { role: 'user', content: userMessage }
        ];

        try {
            statusSpan.innerHTML = '🤔 AI думает...';
            const response = await fetch('https://api.deepseek.com/v1/chat/completions', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${API_KEY}`
                },
                body: JSON.stringify({
                    model: 'deepseek-chat',
                    messages: apiMessages,
                    temperature: 0.7,
                    max_tokens: 2000
                })
            });

            if (!response.ok) {
                const errorData = await response.json().catch(() => ({}));
                let errorMsg = `Ошибка API: ${response.status}`;
                if (errorData.error?.message) errorMsg += ` — ${errorData.error.message}`;
                throw new Error(errorMsg);
            }

            const data = await response.json();
            const assistantReply = data.choices[0].message.content;
            statusSpan.innerHTML = '✅ Ответ получен';
            return assistantReply;
        } catch (err) {
            console.error(err);
            statusSpan.innerHTML = `⚠️ Ошибка: ${err.message}`;
            return `Произошла ошибка: ${err.message}. Проверьте API-ключ и интернет.`;
        }
    }

    // Добавление сообщения пользователя и получение ответа
    async function addUserMessageAndGetReply(text) {
        if (isLoading) return;
        if (!text.trim()) return;

        // Добавляем сообщение пользователя в массив и отрисовываем
        messages.push({ role: 'user', content: text });
        saveMessagesToStorage();
        renderMessages();

        isLoading = true;
        sendBtn.disabled = true;

        // Получаем ответ от API
        const reply = await sendMessageToAPI(text);
        
        // Добавляем ответ ассистента
        messages.push({ role: 'assistant', content: reply });
        saveMessagesToStorage();
        renderMessages();

        isLoading = false;
        sendBtn.disabled = false;
        if (!API_KEY) sendBtn.disabled = true;
    }

    // Обработка отправки
    async function sendCurrentMessage() {
        const text = messageInput.value.trim();
        if (!text) return;
        messageInput.value = '';
        // Авто-расширение текстового поля сбросим
        messageInput.style.height = 'auto';
        await addUserMessageAndGetReply(text);
    }

    function handleKeyDown(e) {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendCurrentMessage();
        }
        // авто-расширение textarea
        messageInput.style.height = 'auto';
        messageInput.style.height = Math.min(messageInput.scrollHeight, 150) + 'px';
    }

    // Новый диалог
    function newDialog() {
        if (isLoading) return;
        messages = [
            { role: 'assistant', content: 'Новый диалог! Чем могу помочь в создании сайтов? 🚀' }
        ];
        saveMessagesToStorage();
        renderMessages();
        messageInput.value = '';
        messageInput.style.height = 'auto';
        statusSpan.innerHTML = '✅ Диалог очищен.';
    }

    // Ввод API-ключа через prompt
    function askForApiKey() {
        let newKey = prompt('Введите ваш API-ключ DeepSeek (начинается с sk-...):', API_KEY);
        if (newKey !== null) {
            newKey = newKey.trim();
            if (newKey.startsWith('sk-') || newKey === '') {
                API_KEY = newKey;
                if (API_KEY) {
                    localStorage.setItem('deepseek_api_key', API_KEY);
                    statusSpan.innerHTML = '✅ Ключ сохранён (в localStorage). Можно общаться.';
                    sendBtn.disabled = false;
                } else {
                    localStorage.removeItem('deepseek_api_key');
                    statusSpan.innerHTML = '⚠️ Ключ удалён. Нажмите кнопку, чтобы ввести заново.';
                    sendBtn.disabled = true;
                }
                updateKeyStatusUI();
            } else {
                alert('Ключ обычно начинается с "sk-". Попробуйте ещё раз.');
            }
        }
    }

    // События
    sendBtn.addEventListener('click', sendCurrentMessage);
    keyStatusBtn.addEventListener('click', askForApiKey);
    newChatBtn.addEventListener('click', newDialog);
    
    // Автоматическая подгрузка при старте
    init();
</script>
</body>
</html>
